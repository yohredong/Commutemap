<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KL Bicycle Commuting Map</title>
    <meta name="description"
        content="Interactive map of community-submitted bicycle commuting routes across Kuala Lumpur.">

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="map"></div>

    <!-- Floating Add Route button -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdQF0kyOMpWGlnbEVZ12jUBt34wsPQgk2UikykW9fqlOnF5fg/viewform?usp=header"
        target="_blank" rel="noopener noreferrer" class="fab-add" id="fab-add" title="Submit your cycling route">
        <span class="fab-icon">+</span>
        <span class="fab-label">Add Route</span>
    </a>
    <!-- Re-open sidebar button (hidden by default, shown when sidebar is closed) -->
    <button class="sidebar-toggle" id="sidebar-toggle" title="Show info panel">☰</button>

    <div class="glass-panel sidebar" id="sidebar">
        <!-- Close button -->
        <button class="sidebar-close" id="sidebar-close" title="Close panel">✕</button>

        <div class="sidebar-header">
            <img src="logo.png" alt="Commute Initiatives | Bike Commute Malaysia" class="sidebar-logo">
            <h1>COMMUTE Map</h1>
            <p class="subtitle">Community Open-sourced Mobility Map for Urban Transport for Everyone</p>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-value" id="total-routes">–</span>
                <span class="stat-label">Total Routes</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="total-distance">–</span>
                <span class="stat-label">Total KM</span>
            </div>
        </div>

        <!-- Visualization toggle -->
        <div class="viz-toggle-container">
            <h3>Visualization</h3>
            <div class="viz-toggle-group">
                <button class="viz-btn active" id="viz-type" title="Color routes by transport type">By Type</button>
                <button class="viz-btn" id="viz-contributor" title="Color routes by contributor">By Contributor</button>
                <button class="viz-btn" id="viz-distance" title="Color routes by distance">By Distance</button>
            </div>
        </div>

        <!-- Legend: By Type (default, visible) -->
        <div class="legend-container" id="legend-type">
            <h3>Legend — Transport Type</h3>
            <div id="type-legend-items"></div>
        </div>

        <!-- Legend: By Contributor (hidden by default) -->
        <div class="legend-container" id="legend-contributor" style="display: none;">
            <h3>Legend — Contributors</h3>
            <div id="contributor-legend-items"></div>
        </div>

        <!-- Legend: By Distance (hidden by default) -->
        <div class="legend-container" id="legend-distance" style="display: none;">
            <h3>Legend — Distance</h3>
            <div class="gradient-bar"></div>
            <div class="gradient-labels">
                <span id="dist-min">0 km</span>
                <span id="dist-max">— km</span>
            </div>
        </div>

        <div class="instructions">
            <p>Hover over a route to highlight it.</p>
            <p>Click on any route for detailed information.</p>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="app.js"></script>
</body>

</html>
