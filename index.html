<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuala Lumpur Bicycle Commuting Map</title>
    
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    
    <div class="glass-panel sidebar">
        <div class="sidebar-header">
            <h1>KL Bicycle Commuting Map</h1>
            <p class="subtitle">Community Submitted Routes</p>
        </div>
        
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-value" id="total-routes">-</span>
                <span class="stat-label">Total Routes</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="total-distance">-</span>
                <span class="stat-label">Total KM</span>
            </div>
        </div>
        
        <div class="legend-container">
            <h3>Legend</h3>
            <div class="legend-item">
                <span class="color-line" style="background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);"></span>
                <span>Cycling Path</span>
            </div>
            <div class="legend-item">
                <span class="color-line" style="background: linear-gradient(90deg, #b02e0c 0%, #eb5b36 100%);"></span>
                <span>Walking Path</span>
            </div>
        </div>

        <div class="instructions">
            <p>Hover over a route to highlight it.</p>
            <p>Click on any route for detailed information.</p>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="app.js"></script>
</body>
</html>
